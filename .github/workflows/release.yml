name: Release

# Tag-driven GitHub Release. Bump the version locally with
# `npm version <patch|minor|major>` (which commits package.json +
# package-lock.json and tags vX.Y.Z), then `git push --follow-tags`.
#
# This workflow fires on the v* tag, verifies the tag matches package.json,
# runs checks, and creates a matching GitHub Release. This package is intended
# for direct GitHub npx usage, not npm registry publication.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the matching GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail loud if the tag and package.json disagree, so releases always match
      # the ref they were cut from. Reads the tag from GITHUB_REF_NAME, not from
      # workflow interpolation.
      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          echo "tag=${tag_version} package.json=${pkg_version}"
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag v${tag_version} does not match package.json version ${pkg_version}"
            exit 1
          fi

      - name: Check
        run: npm run check

      - name: Prepare GitHub Release notes
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          awk -v version="${tag_version}" '
            $0 ~ "^## \\[" version "\\]" { in_section = 1; next }
            in_section && $0 ~ "^## \\[" { exit }
            in_section && $0 ~ "^\\[.*\\]:" { exit }
            in_section { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for release details." > release-notes.md
          fi

          cat >> release-notes.md <<'EOF'

---

Install/apply directly from GitHub:

```bash
npx --yes github:ttiimmaahh/pi-setup
```
EOF

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              --verify-tag
          fi
